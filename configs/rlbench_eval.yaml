server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/rlbench:latest
  runtime: nvidia

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.rlbench.benchmark:RLBenchBenchmark"
    mode: sync
    episodes_per_task: 1
    params:
      tasks:
        - reach_target
      image_size: 256
      max_steps: 200
    action_dim: 8

