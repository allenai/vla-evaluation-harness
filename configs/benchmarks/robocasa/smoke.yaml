# Short contract smoke test; this is not a leaderboard protocol.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robocasa:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.robocasa.benchmark:RoboCasaBenchmark"
    episodes_per_task: 1
    max_steps: 5
    params:
      tasks: [KettleBoiling, ArrangeBreadBasket]
      split: pretrain
      seed: 0
      camera_size: 256
      enable_render: true
