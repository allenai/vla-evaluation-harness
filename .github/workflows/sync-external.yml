name: Sync External Leaderboards
on:
  schedule:
    - cron: '0 8 * * 3'  # Weekly: Wednesday 08:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to sync (leave empty for both)'
        required: false
        type: choice
        options:
          - ''
          - robochallenge
          - roboarena

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install validation deps
        run: pip install jsonschema

      - name: Sync external APIs
        run: |
          SOURCE_ARG=""
          if [ -n "${{ inputs.source }}" ]; then
            SOURCE_ARG="--source ${{ inputs.source }}"
          fi
          python leaderboard/scripts/sync_external.py --apply $SOURCE_ARG

      - name: Validate results
        run: python leaderboard/scripts/validate.py

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'data: sync external leaderboard scores'
          title: 'data: sync RoboChallenge + RoboArena scores'
          body: |
            Automated sync from external leaderboard APIs.

            - **RoboChallenge**: https://robochallenge.ai/leaderboard
            - **RoboArena**: https://robo-arena.github.io/

            Validation passed. Review the diff for new/updated entries.
          branch: sync-external-data
          delete-branch: true
          labels: data
