# StarVLA Qwen2.5-VL-GR00T LIBERO reproduction config
# Checkpoint: StarVLA/Qwen2.5-VL-GR00T-LIBERO-4in1
# Single policy trained on all 4 suites jointly (30K steps)
# Reference: 95.4% avg (spatial 97.8%, object 98.2%, goal 94.6%, 10 90.8%)
server:
  url: "ws://HOST:PORT"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results/starvla-qwen25-groot-libero"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_spatial
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_goal
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
