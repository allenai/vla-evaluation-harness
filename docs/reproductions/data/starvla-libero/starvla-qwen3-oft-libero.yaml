# StarVLA Qwen3-VL-OFT LIBERO reproduction config
# Checkpoint: StarVLA/Qwen3-VL-OFT-LIBERO-4in1
# Single policy trained on all 4 suites jointly (30K steps)
# Reference: 96.6% avg (spatial 97.8%, object 98.6%, goal 96.2%, 10 93.8%)
server:
  url: "ws://HOST:PORT"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results/starvla-qwen3-oft-libero"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_spatial
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_goal
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
