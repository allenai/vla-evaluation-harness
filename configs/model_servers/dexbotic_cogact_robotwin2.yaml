# DB-CogACT model server — RoboTwin 2.0 per-task checkpoint
# Weight: Dexmal/robotwin-db-cogact (HuggingFace, per-task fine-tuned)
# Benchmark: RoboTwin 2.0 (SAPIEN, bimanual manipulation)
#
# Each RoboTwin task has its own fine-tuned checkpoint.
# Override model_path per task (e.g. grab_roller, place_empty_cup).

script: "src/vla_eval/model_servers/dexbotic/cogact.py"
args:
  model_path: Dexmal/robotwin-db-cogact/adjust_bottle
  chunk_size: 16
  camera_keys: '["head_camera", "left_camera", "right_camera"]'
  port: 8000

