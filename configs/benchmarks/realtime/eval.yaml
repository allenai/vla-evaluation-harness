# Live-mode evaluation example (real-time pacing at pace=1).
# Uses Kinetix, which supports live mode (implements get_hold_action).
# NOTE: LIBERO is sync-only and cannot run here.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/kinetix:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.kinetix.benchmark:KinetixBenchmark"
    mode: live
    hz: 10.0
    pace: 1.0
    episodes_per_task: 10
    params:
      seed: 0
      observation_type: symbolic
      max_episode_steps: 256
      rtc_worlds_dir: "/app/rtc/worlds"
      action_noise_std: 0.1
    action_dim: 6
