# X-VLA model server — LIBERO (direct HuggingFace loading)
# Loads the model directly; no external server needed.
#
# Usage: vla-eval serve --config configs/model_servers/xvla_libero.yaml
#
# Available model_path values:
#   2toINF/X-VLA-Libero, 2toINF/X-VLA-WidowX, 2toINF/X-VLA-Calvin-ABC_D, ...

script: "src/vla_eval/model_servers/xvla.py"
args:
  model_path: "2toINF/X-VLA-Libero"
  benchmark_profile: "libero"
  domain_id: 3
  denoising_steps: 10
  chunk_size: 30
  port: 8000
