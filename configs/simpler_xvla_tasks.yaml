# SimplerEnv evaluation — X-VLA WidowX (requires patched ManiSkill2)
# Uses simpler-xvla Docker image with absolute EE control mode.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/simpler-xvla:latest
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"
  volumes:
    - "/usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: stack_green_cube
    mode: sync
    episodes_per_task: 24
    params:
      task_name: "widowx_stack_cube"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_carrot_on_plate
    mode: sync
    episodes_per_task: 24
    params:
      task_name: "widowx_carrot_on_plate"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_spoon_on_tablecloth
    mode: sync
    episodes_per_task: 24
    params:
      task_name: "widowx_spoon_on_towel"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_eggplant_in_basket
    mode: sync
    episodes_per_task: 24
    params:
      task_name: "widowx_put_eggplant_in_basket"
