# GR00T N1.6 LIBERO reproduction config
# Community checkpoint by 0xAnkitSingh (per-suite finetuned, 20K steps)
# Reference: 97.0% average (spatial 97.65%, goal 97.5%, object 98.45%, 10 94.35%)
# NOTE: requires use_sim_policy_wrapper=true in model server config
server:
  url: "ws://HOST:PORT"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results/groot-libero"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_spatial
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_goal
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
