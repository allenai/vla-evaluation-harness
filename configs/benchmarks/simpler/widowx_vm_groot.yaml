# SimplerEnv WidowX VM for GR00T (200 eps/task, simpler-groot image)
extends: widowx_vm.yaml
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/simpler-groot:latest
benchmarks:
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: stack_green_cube
    mode: sync
    episodes_per_task: 200
    params:
      task_name: "widowx_stack_cube"
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_carrot_on_plate
    mode: sync
    episodes_per_task: 200
    params:
      task_name: "widowx_carrot_on_plate"
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_spoon_on_tablecloth
    mode: sync
    episodes_per_task: 200
    params:
      task_name: "widowx_spoon_on_towel"
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: put_eggplant_in_basket
    mode: sync
    episodes_per_task: 200
    params:
      task_name: "widowx_put_eggplant_in_basket"
