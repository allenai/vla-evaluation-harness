name: CI

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run --python 3.11 --dev ty check

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
      - run: ruff check
      - run: ruff format --check --diff

  test-ubuntu:
    runs-on: ubuntu-latest
    name: Pytest on Ubuntu
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install Dependencies
        # `--all-groups` so the `leaderboard` dep group (typer,
        # beautifulsoup4, etc.) is installed — leaderboard tests
        # import from scripts that carry uv-script-level deps not
        # otherwise resolved.
        run: uv sync --python 3.11 --all-extras --all-groups
        env:
          UV_TORCH_BACKEND: auto

      - name: Run pytest
        run: uv run pytest