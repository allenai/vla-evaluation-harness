server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robodojo:latest
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"
    - "ACCEPT_EULA=Y"
    - "PRIVACY_CONSENT=Y"
  volumes:
    - "${oc.env:ROBODOJO_ASSETS}:/workspace/RoboDojo/Assets:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.robodojo.benchmark:RoboDojoBenchmark"
    # These three published tasks all provide at least 25 layouts in group 0.
    episodes_per_task: 25
    action_dim: 14
    params:
      tasks:
        - stack_blocks
        - insert_tubes
        - sort_nesting_dolls_by_size
      env_config: arx_x5
      action_dims: [6, 1, 6, 1]
      max_steps: 100
      seed: 0
