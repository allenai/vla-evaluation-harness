# RoboCasa kitchen manipulation, default atomic subset (6 tasks x 5 episodes).
# Needs ~10GB of kitchen assets from HuggingFace.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robocasa:latest
  env: [VLA_EVAL_RENDER]

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.robocasa.benchmark:RoboCasaBenchmark"
    episodes_per_task: 5
    params:
      robot: PandaOmron
      camera_size: 256
      max_steps: 500
      split: pretrain
      seed: null
