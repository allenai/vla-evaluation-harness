server:
  url: "ws://DGX-H100-12:8001"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results/xvla-libero"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_spatial
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      absolute_action: true
      send_wrist_image: true
      send_state: true
      state_format: ee_rot6d
      flip_wrist_image: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      absolute_action: true
      send_wrist_image: true
      send_state: true
      state_format: ee_rot6d
      flip_wrist_image: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_goal
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      absolute_action: true
      send_wrist_image: true
      send_state: true
      state_format: ee_rot6d
      flip_wrist_image: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      absolute_action: true
      send_wrist_image: true
      send_state: true
      state_format: ee_rot6d
      flip_wrist_image: false
