# RoboDojo full simulation protocol (arXiv:2607.04434, Table 1 setting).
#
# 42 tasks across five capability dimensions. Episode counts follow the
# published per-task eval_nums (task/RoboDojo/config/_task.yml): 50 episodes
# for most tasks; the 12 Generalization tasks run 25 standard + 25 randomized
# episodes via their `_random` task variants. `seed` selects the published
# Eval_Layout group; the paper reports mean +/- std over three training seeds,
# each evaluated once per task with this layout protocol.
#
# The paper's headline numbers average the five dimension means (NOT the plain
# per-task mean), and unstable episodes (scene-stability aborts, surfaced here
# as episode errors) are excluded from the official denominator.
#
# NOTE: Isaac's simulation context is process-global, so one container run can
# evaluate exactly ONE task. Do not `vla-eval run -c` this file directly —
# drive it with scripts/run_robodojo_protocol.sh, which runs one task at a time.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robodojo:latest
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"
    - "ACCEPT_EULA=Y"
    - "PRIVACY_CONSENT=Y"
    # The image pins VK_ICD_FILENAMES to the toolkit-injected /etc ICD, which some
    # hosts don't create — Vulkan then dies with ERROR_INCOMPATIBLE_DRIVER. Use the
    # image's own ICD, which exists everywhere.
    - "VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/nvidia_icd.json"
    - "VK_DRIVER_FILES=/usr/share/vulkan/icd.d/nvidia_icd.json"  # newer Vulkan loaders prefer this over VK_ICD_FILENAMES
  volumes:
    - "${oc.env:ROBODOJO_ASSETS,${oc.env:VLA_EVAL_ASSETS_CACHE,${oc.env:XDG_CACHE_HOME,${oc.env:HOME}/.cache}/vla-eval/assets}/robodojo/Assets}:/workspace/RoboDojo/Assets:ro"

output_dir: "./results"

benchmarks:
  # -- Generalization: 12 tasks, 25 standard episodes each ------------------
  - benchmark: "vla_eval.benchmarks.robodojo.benchmark:RoboDojoBenchmark"
    episodes_per_task: 25
    action_dim: 14
    params:
      seed: 0
      tasks:
        - stack_bowls
        - push_T
        - pack_objects_into_box
        - fold_clothes
        - hang_mugs
        - sweep_blocks
        - pour_liquid_into_cup
        - make_toast
        - arrange_largest_number
        - sort_nesting_dolls_by_size
        - store_laptop_and_headphones
        - stack_blocks

  # -- Generalization: the same 12 tasks, 25 randomized episodes each -------
  - benchmark: "vla_eval.benchmarks.robodojo.benchmark:RoboDojoBenchmark"
    episodes_per_task: 25
    action_dim: 14
    params:
      seed: 0
      tasks:
        - stack_bowls_random
        - push_T_random
        - pack_objects_into_box_random
        - fold_clothes_random
        - hang_mugs_random
        - sweep_blocks_random
        - pour_liquid_into_cup_random
        - make_toast_random
        - arrange_largest_number_random
        - sort_nesting_dolls_by_size_random
        - store_laptop_and_headphones_random
        - stack_blocks_random

  # -- Open (8) + Memory (5) + Precision (8) + Long-Horizon (6): 50 eps -----
  - benchmark: "vla_eval.benchmarks.robodojo.benchmark:RoboDojoBenchmark"
    episodes_per_task: 50
    action_dim: 14
    params:
      seed: 0
      tasks:
        # Open
        - align_blocks
        - solve_equation
        - stack_blocks_by_language
        - general_pickup
        - classify_objects_by_language
        - pick_from_conveyor_by_image
        - store_tools_in_toolbox
        - pour_by_language
        # Memory (imitate_sorting_sequence is in the competition entry below)
        - cover_blocks
        - match_and_pick_from_conveyor
        - swap_T
        - press_by_number
        - swap_blocks
        # Precision
        - fasten_screws
        - insert_tubes
        - plug_in_charger
        - pour_balls_into_vase
        - play_Xylophone
        - deposit_coin
        - insert_key
        - build_tower
        # Long-Horizon (make_kong / play_tic_tac_toe are in the entry below)
        - put_bottles_into_dustbin
        - classify_objects
        - fill_pen_holder
        - fill_egg_holder
        - organize_table
        - play_stacking_toy

  # -- Franka-competition tasks: a scripted Franka arm shares the scene -----
  # (robot config switched automatically by RoboDojo's process_config). Policy
  # action space stays dual-X5 14-D; the Franka replays pkl trajectories, no planner.
  #
  # KNOWN DEVIATION: when the scripted Franka move fails, upstream marks the
  # episode "unstable" and EXCLUDES it from the denominator. vla-eval's collector
  # counts every episode, so here an unstable episode is scored as a failure. This
  # biases these 3 tasks' SR slightly pessimistic vs the official leaderboard.
  - benchmark: "vla_eval.benchmarks.robodojo.benchmark:RoboDojoBenchmark"
    episodes_per_task: 50
    action_dim: 14
    params:
      seed: 0
      tasks:
        - imitate_sorting_sequence   # Memory
        - make_kong                  # Long-Horizon
        - play_tic_tac_toe           # Long-Horizon
