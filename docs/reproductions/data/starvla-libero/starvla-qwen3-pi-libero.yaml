# StarVLA Qwen3-VL-PI LIBERO reproduction config
# Checkpoint: StarVLA/Qwen3-VL-PI-LIBERO-4in1
# Single policy trained on all 4 suites jointly (30K steps)
# Reference: ~95-97% avg (see StarVLA README for exact per-suite numbers)
server:
  url: "ws://HOST:PORT"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results/starvla-qwen3-pi-libero"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_spatial
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_goal
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: false
